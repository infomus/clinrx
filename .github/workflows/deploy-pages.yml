name: Deploy static site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @clinrx/types build
          pnpm --filter @clinrx/validation build
          pnpm --filter @clinrx/core build
          pnpm --filter @clinrx/api build

      - name: Build mobile web app
        env:
          EXPO_PUBLIC_POWERSYNC_URL: ${{ secrets.EXPO_PUBLIC_POWERSYNC_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
        run: pnpm --filter @clinrx/mobile build

      - name: Prepare Pages artifact
        run: |
          cp landing/CNAME apps/mobile/dist/CNAME
          cp apps/mobile/dist/index.html apps/mobile/dist/404.html
          mkdir -p apps/mobile/dist/review/calibration
          cp apps/mobile/dist/index.html apps/mobile/dist/review/calibration/index.html
          mkdir -p apps/mobile/dist/review/kg
          cp apps/mobile/dist/index.html apps/mobile/dist/review/kg/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/mobile/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
